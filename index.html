<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamweaver | Digital Grimoire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --dream-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        body { font-family: 'Inter', sans-serif; background: var(--dream-gradient); background-attachment: fixed; color: white; min-height: 100vh; overflow-x: hidden; }
        
        .haze-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.1), transparent 70%); filter: blur(80px); z-index: -1; animation: pulse 15s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px) saturate(120%); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; transition: all 0.4s ease; }
        
        /* Interactive States */
        [contenteditable="true"]:focus { outline: none; color: #93c5fd; text-shadow: 0 0 15px rgba(147, 197, 253, 0.5); }
        .attribute-orb:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.07); }
        
        .map-slot { aspect-ratio: 16/9; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .map-slot img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: opacity 0.5s; }
        .map-slot:hover img { opacity: 1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="haze-overlay"></div>

    <main class="max-w-5xl mx-auto space-y-10">
        
        <header class="flex flex-col md:flex-row justify-between items-end gap-6">
            <div class="w-full md:w-auto">
                <h1 id="char-name" contenteditable="true" class="text-5xl font-extralight tracking-tighter uppercase opacity-90">Character Name</h1>
                <p id="char-tagline" contenteditable="true" class="text-sm tracking-[0.3em] text-blue-300 opacity-50 uppercase mt-2">Class • Origin • Milestone</p>
            </div>
            
            <div class="glass px-10 py-5 flex gap-12 text-center">
                <div class="group cursor-pointer" onclick="adjustStat('life-val', -1)">
                    <span id="life-val" contenteditable="true" class="block text-3xl font-light">20</span>
                    <span class="text-[10px] uppercase tracking-widest opacity-40 group-hover:opacity-100 transition-opacity">Life Force</span>
                </div>
                <div class="group cursor-pointer" onclick="adjustStat('token-val', 1)">
                    <span id="token-val" contenteditable="true" class="block text-3xl font-light text-purple-300">0</span>
                    <span class="text-[10px] uppercase tracking-widest opacity-40 group-hover:opacity-100 transition-opacity">Tokens</span>
                </div>
            </div>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-6 gap-4">
            <div class="glass attribute-orb p-4 text-center space-y-1">
                <div id="label-1" contenteditable="true" class="text-[10px] uppercase tracking-widest opacity-40">Brawn</div>
                <div id="val-1" contenteditable="true" class="text-2xl font-light" onfocus="this.innerText=''" onblur="if(this.innerText=='')this.innerText='+0'">+2</div>
                <button onclick="rollAttr('label-1', 'val-1')" class="text-[9px] uppercase opacity-20 hover:opacity-100 tracking-tighter mt-2 border border-white/10 px-2 rounded">Roll d20</button>
            </div>
            <div class="glass attribute-orb p-4 text-center space-y-1">
                <div id="label-2" contenteditable="true" class="text-[10px] uppercase tracking-widest opacity-40">Intellect</div>
                <div id="val-2" contenteditable="true" class="text-2xl font-light">+3</div>
                <button onclick="rollAttr('label-2', 'val-2')" class="text-[9px] uppercase opacity-20 hover:opacity-100 tracking-tighter mt-2 border border-white/10 px-2 rounded">Roll d20</button>
            </div>
            <div class="glass attribute-orb p-4 text-center space-y-1">
                <div id="label-3" contenteditable="true" class="text-[10px] uppercase tracking-widest opacity-40">Empathy</div>
                <div id="val-3" contenteditable="true" class="text-2xl font-light">+1</div>
                <button onclick="rollAttr('label-3', 'val-3')" class="text-[9px] uppercase opacity-20 hover:opacity-100 tracking-tighter mt-2 border border-white/10 px-2 rounded">Roll d20</button>
            </div>
            <div class="glass attribute-orb p-4 text-center space-y-1">
                <div id="label-4" contenteditable="true" class="text-[10px] uppercase tracking-widest opacity-40">Sense</div>
                <div id="val-4" contenteditable="true" class="text-2xl font-light">+2</div>
                <button onclick="rollAttr('label-4', 'val-4')" class="text-[9px] uppercase opacity-20 hover:opacity-100 tracking-tighter mt-2 border border-white/10 px-2 rounded">Roll d20</button>
            </div>
            <div class="glass attribute-orb p-4 text-center space-y-1">
                <div id="label-5" contenteditable="true" class="text-[10px] uppercase tracking-widest opacity-40">Agility</div>
                <div id="val-5" contenteditable="true" class="text-2xl font-light">+2</div>
                <button onclick="rollAttr('label-5', 'val-5')" class="text-[9px] uppercase opacity-20 hover:opacity-100 tracking-tighter mt-2 border border-white/10 px-2 rounded">Roll d20</button>
            </div>
            <div class="glass attribute-orb p-4 text-center space-y-1">
                <div id="label-6" contenteditable="true" class="text-[10px] uppercase tracking-widest opacity-40">Fortitude</div>
                <div id="val-6" contenteditable="true" class="text-2xl font-light">+4</div>
                <button onclick="rollAttr('label-6', 'val-6')" class="text-[9px] uppercase opacity-20 hover:opacity-100 tracking-tighter mt-2 border border-white/10 px-2 rounded">Roll d20</button>
            </div>
        </section>

        <section class="grid md:grid-cols-2 gap-10">
            <div class="space-y-6">
                <div class="flex justify-between items-center px-2">
                    <h2 contenteditable="true" class="text-xs font-light tracking-[0.4em] opacity-40 uppercase">Reliquary</h2>
                    <button onclick="addArtifact()" class="text-[10px] uppercase tracking-widest bg-white/5 hover:bg-white/10 px-4 py-1 rounded-full border border-white/10 transition-all">+ Manifest</button>
                </div>
                <div id="artifact-list" class="space-y-4">
                    </div>
            </div>

            <div class="space-y-6">
                <h2 contenteditable="true" class="text-xs font-light tracking-[0.4em] opacity-40 uppercase">Mind's Eye</h2>
                <div class="glass p-6 space-y-4">
                    <div id="map-container" class="map-slot cursor-pointer" onclick="updateMap()">
                        <span id="map-placeholder" class="text-[10px] uppercase tracking-widest opacity-20">Tap to project image URL</span>
                    </div>
                    <p id="scene-notes" contenteditable="true" class="text-sm font-light opacity-60 italic leading-relaxed text-center px-4">"The spire pulses with a soft violet light..."</p>
                </div>
            </div>
        </section>

    </main>

    <div id="roll-overlay" class="fixed bottom-12 left-1/2 -translate-x-1/2 glass px-10 py-4 opacity-0 transition-all duration-700 pointer-events-none transform translate-y-10">
        <span id="roll-output" class="text-xl font-extralight tracking-[0.2em]"></span>
    </div>

    <script>
        // --- Persistence for all editable fields ---
        const saveFields = () => {
            const data = {};
            document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                if(el.id) data[el.id] = el.innerText;
            });
            localStorage.setItem('dreamData', JSON.stringify(data));
        };

        const loadFields = () => {
            const saved = JSON.parse(localStorage.getItem('dreamData'));
            if(saved) {
                Object.keys(saved).forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.innerText = saved[id];
                });
            }
            // Load map if exists
            const savedMap = localStorage.getItem('dreamMap');
            if(savedMap) renderMap(savedMap);
        };

        document.addEventListener('input', saveFields);
        window.onload = loadFields;

        // --- Stat Adjusters ---
        function adjustStat(id, amt) {
            const el = document.getElementById(id);
            el.innerText = parseInt(el.innerText) + amt;
            saveFields();
        }

        // --- Dice Logic ---
        function rollAttr(labelId, valId) {
            const label = document.getElementById(labelId).innerText;
            const mod = parseInt(document.getElementById(valId).innerText) || 0;
            const roll = Math.floor(Math.random() * 20) + 1;
            
            const output = document.getElementById('roll-output');
            const overlay = document.getElementById('roll-overlay');
            
            output.innerText = `${label}: ${roll} + ${mod} = ${roll + mod}`;
            overlay.style.opacity = "1";
            overlay.style.transform = "translateY(0) translateX(-50%)";
            
            setTimeout(() => {
                overlay.style.opacity = "0";
                overlay.style.transform = "translateY(20px) translateX(-50%)";
            }, 4000);
        }

        // --- Artifacts ---
        function addArtifact() {
            const list = document.getElementById('artifact-list');
            const item = document.createElement('div');
            item.className = "glass p-5 animate-in slide-in-from-right duration-500 group";
            item.innerHTML = `
                <div class="flex justify-between items-start">
                    <h3 contenteditable="true" class="font-light tracking-widest text-blue-200 outline-none">NEW ITEM</h3>
                    <button onclick="this.parentElement.parentElement.remove(); saveFields();" class="opacity-0 group-hover:opacity-20 text-[10px]">DISSOLVE</button>
                </div>
                <p contenteditable="true" class="text-xs opacity-50 font-light mt-2 outline-none italic leading-relaxed text-blue-50/80">Describe the dream-logic of this object...</p>
            `;
            list.appendChild(item);
            saveFields();
        }

        // --- Map / Mind's Eye ---
        function updateMap() {
            const url = prompt("Enter the URL of a dream image or map:");
            if(url) {
                renderMap(url);
                localStorage.setItem('dreamMap', url);
            }
        }

        function renderMap(url) {
            const container = document.getElementById('map-container');
            container.innerHTML = `<img src="${url}" alt="Dream Scene">`;
        }
    </script>
</body>
</html>
