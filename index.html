<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamweaver | Digital Grimoire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --dream-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        body { font-family: 'Inter', sans-serif; background: var(--dream-gradient); background-attachment: fixed; color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* Haze Animation */
        .haze-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.1), transparent 70%); filter: blur(80px); z-index: -1; animation: pulse 15s infinite alternate; }
        @keyframes pulse { from { transform: scale(1) translate(0, 0); } to { transform: scale(1.3) translate(5%, 5%); } }

        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px) saturate(120%); -webkit-backdrop-filter: blur(20px) saturate(120%); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .attribute-orb { cursor: pointer; transition: all 0.3s ease; }
        .attribute-orb:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.08); }
        
        /* Hidden Modal */
        #artifact-modal { display: none; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="haze-overlay"></div>

    <main class="max-w-4xl mx-auto space-y-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <h1 id="char-name" contenteditable="true" class="text-4xl font-extralight tracking-widest uppercase opacity-80 outline-none">New Dreamer</h1>
                <p id="char-class" contenteditable="true" class="text-sm tracking-widest text-blue-300 opacity-60 outline-none uppercase">Dreamwalker • Milestone 1</p>
            </div>
            
            <div class="glass px-8 py-4 flex gap-10 text-center">
                <div class="cursor-pointer" onclick="changeStat('life', -1)">
                    <span id="life-val" class="block text-2xl font-light">20</span>
                    <span class="text-[10px] uppercase tracking-tighter opacity-50">Life Force</span>
                </div>
                <div class="cursor-pointer" onclick="changeStat('tokens', 1)">
                    <span id="token-val" class="block text-2xl font-light text-purple-300">0</span>
                    <span class="text-[10px] uppercase tracking-tighter opacity-50">Tokens</span>
                </div>
            </div>
        </header>

        <section class="grid grid-cols-3 md:grid-cols-6 gap-4">
            <div class="glass attribute-orb flex flex-col items-center p-4" onclick="rollDice('Brawn', 2)">
                <span class="text-xs opacity-40 uppercase mb-1">BRN</span>
                <span id="brn-mod" contenteditable="true" class="text-xl outline-none">+2</span>
            </div>
            <div class="glass attribute-orb flex flex-col items-center p-4" onclick="rollDice('Intelligence', 3)">
                <span class="text-xs opacity-40 uppercase mb-1">INT</span>
                <span id="int-mod" contenteditable="true" class="text-xl outline-none">+3</span>
            </div>
            <div class="glass attribute-orb flex flex-col items-center p-4" onclick="rollDice('Empathy', 1)">
                <span class="text-xs opacity-40 uppercase mb-1">EMP</span>
                <span id="emp-mod" contenteditable="true" class="text-xl outline-none">+1</span>
            </div>
            <div class="glass attribute-orb flex flex-col items-center p-4" onclick="rollDice('Sense', 2)">
                <span class="text-xs opacity-40 uppercase mb-1">SNS</span>
                <span id="sns-mod" contenteditable="true" class="text-xl outline-none">+2</span>
            </div>
            <div class="glass attribute-orb flex flex-col items-center p-4" onclick="rollDice('Agility', 2)">
                <span class="text-xs opacity-40 uppercase mb-1">AGL</span>
                <span id="agl-mod" contenteditable="true" class="text-xl outline-none">+2</span>
            </div>
            <div class="glass attribute-orb flex flex-col items-center p-4" onclick="rollDice('Fortitude', 4)">
                <span class="text-xs opacity-40 uppercase mb-1">FOR</span>
                <span id="for-mod" contenteditable="true" class="text-xl outline-none">+4</span>
            </div>
        </section>

        <section class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-sm font-light tracking-[0.2em] opacity-50 uppercase">The Reliquary</h2>
                <button onclick="toggleModal()" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full border border-white/20 transition-all">+ Add Artifact</button>
            </div>
            <div id="artifact-list" class="grid md:grid-cols-2 gap-4">
                </div>
        </section>

    </main>

    <div id="artifact-modal" class="fixed inset-0 bg-black/40 backdrop-blur-md flex items-center justify-center p-6 z-50">
        <div class="glass p-8 w-full max-w-md space-y-4">
            <h3 class="text-xl font-extralight tracking-widest uppercase">Forge Artifact</h3>
            <input id="art-name" type="text" placeholder="Artifact Name" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-blue-400">
            <textarea id="art-desc" placeholder="Lore and Mechanics..." class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none h-32 focus:border-blue-400"></textarea>
            <div class="flex gap-4">
                <button onclick="addArtifact()" class="flex-1 bg-blue-500/20 hover:bg-blue-500/40 p-3 rounded-xl border border-blue-500/50 transition-all">Manifest</button>
                <button onclick="toggleModal()" class="flex-1 bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/10 transition-all">Dissolve</button>
            </div>
        </div>
    </div>

    <div id="dice-result" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass px-8 py-4 pointer-events-none opacity-0 transition-all duration-500 transform translate-y-10">
        <span id="roll-text" class="text-lg font-light tracking-widest text-blue-200"></span>
    </div>

    <script>
        // --- Persistence Logic ---
        const editableIds = ['char-name', 'char-class', 'life-val', 'token-val', 'brn-mod', 'int-mod', 'emp-mod', 'sns-mod', 'agl-mod', 'for-mod'];
        
        editableIds.forEach(id => {
            const el = document.getElementById(id);
            const saved = localStorage.getItem(id);
            if (saved) el.innerText = saved;
            el.addEventListener('input', () => localStorage.setItem(id, el.innerText));
        });

        function changeStat(type, amt) {
            const id = type === 'life' ? 'life-val' : 'token-val';
            const el = document.getElementById(id);
            el.innerText = parseInt(el.innerText) + amt;
            localStorage.setItem(id, el.innerText);
        }

        // --- Dice Roller ---
        function rollDice(name, mod) {
            const roll = Math.floor(Math.random() * 20) + 1;
            const total = roll + parseInt(document.getElementById(name.substring(0,3).toLowerCase()+'-mod').innerText);
            
            const box = document.getElementById('dice-result');
            document.getElementById('roll-text').innerText = `${name}: ${roll} + ${total-roll} = ${total}`;
            
            box.style.opacity = "1";
            box.style.transform = "translateY(0) translateX(-50%)";
            setTimeout(() => {
                box.style.opacity = "0";
                box.style.transform = "translateY(10px) translateX(-50%)";
            }, 3000);
        }

        // --- Artifact Logic ---
        function toggleModal() { document.getElementById('artifact-modal').classList.toggle('modal-active'); }

        function addArtifact() {
            const name = document.getElementById('art-name').value;
            const desc = document.getElementById('art-desc').value;
            if(!name) return;

            const card = document.createElement('div');
            card.className = "glass p-6 space-y-2 animate-in fade-in duration-700";
            card.innerHTML = `<h3 class="font-light text-blue-200 tracking-wide">${name}</h3><p class="text-xs opacity-60 leading-relaxed">${desc}</p>`;
            
            document.getElementById('artifact-list').appendChild(card);
            toggleModal();
            
            // Reset fields
            document.getElementById('art-name').value = '';
            document.getElementById('art-desc').value = '';
        }
    </script>
</body>
</html>
